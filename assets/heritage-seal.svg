<svg width="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Heritage medallion: crowned Croatian checkerboard shield + circular motto -->
  <defs>
    <path id="seal-top" d="M30 100 A70 70 0 0 1 170 100"/>
    <path id="seal-bot" d="M32 100 A68 68 0 0 0 168 100"/>
    <clipPath id="shield-clip">
      <path d="M72 94 L128 94 L128 134 C128 148 114 156 100 162 C86 156 72 148 72 134 Z"/>
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="94" fill="none" stroke="#B68E3F" stroke-width="2"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#B68E3F" stroke-width="1"/>

  <g font-family="Georgia,'Times New Roman',serif" fill="#B68E3F" font-size="12.5" letter-spacing="2.5">
    <text text-anchor="middle"><textPath href="#seal-top" startOffset="50%">CRAFTED WITH HERITAGE</textPath></text>
    <text text-anchor="middle"><textPath href="#seal-bot" startOffset="50%">DISTILLED IN CROATIA</textPath></text>
  </g>
  <!-- side stars -->
  <g fill="#B68E3F"><circle cx="30" cy="100" r="2.4"/><circle cx="170" cy="100" r="2.4"/></g>

  <!-- crown -->
  <g fill="#B68E3F" stroke="#8a661f" stroke-width="0.6">
    <path d="M74 78 L80 62 L90 74 L100 58 L110 74 L120 62 L126 78 Z"/>
    <rect x="74" y="78" width="52" height="8" rx="1"/>
    <circle cx="80" cy="62" r="2.6"/><circle cx="100" cy="58" r="2.8"/><circle cx="120" cy="62" r="2.6"/>
  </g>

  <!-- checkerboard shield -->
  <g clip-path="url(#shield-clip)">
    <rect x="72" y="94" width="56" height="70" fill="#F6F1E7"/>
    <g fill="#C0392B">
      <rect x="72" y="94" width="14" height="14"/><rect x="100" y="94" width="14" height="14"/>
      <rect x="86" y="108" width="14" height="14"/><rect x="114" y="108" width="14" height="14"/>
      <rect x="72" y="122" width="14" height="14"/><rect x="100" y="122" width="14" height="14"/>
      <rect x="86" y="136" width="14" height="14"/><rect x="114" y="136" width="14" height="14"/>
      <rect x="72" y="150" width="14" height="12"/><rect x="100" y="150" width="14" height="12"/>
    </g>
  </g>
  <path d="M72 94 L128 94 L128 134 C128 148 114 156 100 162 C86 156 72 148 72 134 Z"
        fill="none" stroke="#B68E3F" stroke-width="2.2"/>
</svg>
