    <g transform="translate(40,0)"><path d="M6 8 h16 l-2 22 h-12 z M10 8 v-3 h8 v3"/></g>
    <g transform="translate(80,0)" stroke-linejoin="round"><path d="M14 4 l6 10 h-12 z M8 18 l-4 8 h10 M26 18 l4 8 h-10"/></g>
